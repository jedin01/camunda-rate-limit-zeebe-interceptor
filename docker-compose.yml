networks:
  camunda-platform:

services:
  build-artifacts:
    image: maven:3.9-eclipse-temurin-17
    container_name: build-artifacts
    working_dir: /build
    volumes:
      - ./:/build
      - maven-cache:/root/.m2
    command: >
      sh -c "mvn -f interceptor/pom.xml clean package &&
             mvn -f filter/pom.xml clean package"
    networks:
      - camunda-platform

  zeebe:
    image: camunda/zeebe:8.7.2

    container_name: zeebe

    ports:
      - 26500:26500
      - 9600:9600
      - 8080:8080
    environment:
      - ZEEBE_BROKER_GATEWAY_REST_ENABLED=true
      - ZEEBE_BROKER_GATEWAY_INTERCEPTORS_0_ID=rate-limit
      - ZEEBE_BROKER_GATEWAY_INTERCEPTORS_0_CLASSNAME=com.example.RateLimitInterceptor
      - ZEEBE_BROKER_GATEWAY_INTERCEPTORS_0_JARPATH=/usr/local/zeebe/interceptors/rate-limit-interceptor.jar
      - ZEEBE_BROKER_GATEWAY_FILTERS_0_ID=rate-limit
      - ZEEBE_BROKER_GATEWAY_FILTERS_0_CLASSNAME=com.example.RateLimitFilter
      - ZEEBE_BROKER_GATEWAY_FILTERS_0_JARPATH=/usr/local/camunda/filters/rate-limit-filter.jar
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_CLASSNAME=io.camunda.zeebe.exporter.ElasticsearchExporter
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_URL=http://elasticsearch:9200
      - CAMUNDA_SECURITY_AUTHENTICATION_UNPROTECTEDAPI=true
      - CAMUNDA_SECURITY_ENABLED=false
    volumes:
      - ./interceptor/target/rate-limit-interceptor.jar:/usr/local/zeebe/interceptors/rate-limit-interceptor.jar:ro
      - ./filter/target/rate-limit-filter.jar:/usr/local/camunda/filters/rate-limit-filter.jar:ro

    depends_on:
      build-artifacts:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_started

    networks:
      - camunda-platform

  operate:
    image: camunda/operate:8.7.2

    container_name: operate

    ports:
      - 8081:8080

    environment:
      - CAMUNDA_OPERATE_ZEEBE_GATEWAYADDRESS=zeebe:26500

      - CAMUNDA_OPERATE_ELASTICSEARCH_URL=http://elasticsearch:9200

      - CAMUNDA_OPERATE_ZEEBEELASTICSEARCH_URL=http://elasticsearch:9200

    depends_on:
      - zeebe

      - elasticsearch

    networks:
      - camunda-platform

  tasklist:
    image: camunda/tasklist:8.7.2

    container_name: tasklist

    ports:
      - 8082:8080

    environment:
      - CAMUNDA_TASKLIST_ZEEBE_GATEWAYADDRESS=zeebe:26500

      - CAMUNDA_TASKLIST_ELASTICSEARCH_URL=http://elasticsearch:9200

      - CAMUNDA_TASKLIST_ZEEBEELASTICSEARCH_URL=http://elasticsearch:9200

    depends_on:
      - zeebe

      - elasticsearch

    networks:
      - camunda-platform

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0

    container_name: elasticsearch

    ports:
      - 9200:9200

    environment:
      - discovery.type=single-node

      - xpack.security.enabled=false

      - ES_JAVA_OPTS=-Xms512m -Xmx512m

    ulimits:
      memlock:
        soft: -1

        hard: -1

    networks:
      - camunda-platform

volumes:
  maven-cache:
